# Free JT7 policy file
autonomy:
  mode: autonomous
  require_user_confirmation_default: false
  planning:
    classify_complexity: true
    complex_threshold: medium
    require_task_run_for_complex: true
    prefer_router_for_complex: true
  orchestration:
    enabled: true
    prefer_parallel: true
    max_parallel_agents: 4
    allow_background_agents: true
    require_validation_agent: true
risk:
  allow_high_risk_without_approval: true
  allow_destructive: true
  require_confirmation_for_high_risk: false
  thresholds:
    low_keywords:
      - list
      - search
      - read
      - inspect
      - analyze
    medium_keywords:
      - install
      - update
      - configure
      - build
      - test
    high_keywords:
      - delete
      - drop
      - format
      - reset
      - remove
      - shutdown
  destructive_patterns:
    - "rm "
    - rmdir
    - "del "
    - "drop "
    - "truncate "
    - git reset --hard
execution:
  retry:
    max_attempts: 3
  allow_admin: true
  allow_network: true
  allow_background_processes: true
  allow_external_paths: true
  prefer_direct_execution: true
  prefer_gateway_for_external_tools: true
  allowlist:
    enabled: false
    bins:
      - get-childitem
      - get-content
      - select-string
      - python
      - git
      - node
      - npm
      - pnpm
      - powershell
      - pwsh
      - cmd
admin:
  enabled: true
  strategy: runas-on-demand
  doctor_command: admin-doctor
  exec_command: admin-exec
  require_audit: true
mcp:
  enabled: true
  auto_bootstrap: true
  default_server: free-jt7-local
  workspace_config: .vscode/mcp.json
  allow_gateway_tools: true
  prefer_local_server: true
quality_gate:
  required: true
  require_plan_for_complex: true
  require_validation_for_mutations: true
skills:
  activation: ephemeral
  max_composed: 5
shell:
  strategy: cross-shell
  default: powershell
telemetry:
  level: full_sanitized
report:
  style: executive_technical
overrides:
  blocklists: []
  hard_stops: false
  restrictive_mode: false
